name: release-rehearsal

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Rehearsal version tag (e.g. 0.4.0-test)'
        required: true
        default: '0.4.0-test'

jobs:
  rehearse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Verify clean tree before rehearsal
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "::error::working tree must be clean before release rehearsal"
            git status
            exit 1
          fi
        shell: bash

      - name: Run release --dry-run
        run: bun run release "${{ inputs.version }}" --dry-run

      - name: Determine expected version-synced file count
        id: expected
        run: |
          # Count join(ROOT, entries in the three VERSIONED_* arrays in release.ts.
          # Each indented join(ROOT, line is exactly one versioned file path.
          count=$(grep -E '^\s+join\(ROOT,' scripts/release.ts | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Expected version-synced files: $count"
        shell: bash

      - name: Verify version sync touched expected files
        run: |
          expected="${{ steps.expected.outputs.count }}"
          changed=$(git status --porcelain | grep -E "(package\.json|plugin\.config\.json|support-pack\.json|capabilities\.json)$" | wc -l)
          if [[ "$changed" -ne "$expected" ]]; then
            echo "::error::expected $expected version-synced files, got $changed"
            git status --porcelain
            exit 1
          fi
          echo "OK: $changed files version-synced as expected"
        shell: bash

      - name: Verify assemble artifacts present
        run: |
          if [[ ! -d .tmp/phase-e-release ]]; then
            echo "::error::.tmp/phase-e-release directory missing"
            exit 1
          fi
          ls -la .tmp/phase-e-release/
        shell: bash

      - name: Verify assemble produced expected artifacts
        run: |
          dir=.tmp/phase-e-release
          # assemble.ts produces: *.tgz (UPM), *.zip x2 (codex + claude packs),
          # release-manifest.json, SHA256SUMS — at minimum 5 files.
          if [[ ! -f "$dir/SHA256SUMS" ]] && [[ -z "$(find $dir -maxdepth 1 -name '*.tgz' -o -name '*.zip' 2>/dev/null)" ]]; then
            echo "::error::assemble.ts produced empty or malformed output in $dir"
            ls -laR "$dir"
            exit 1
          fi
          # Count non-staging files; expect at least: upm.tgz + codex.zip + claude.zip + manifest + SHA256SUMS = 5
          file_count=$(find "$dir" -maxdepth 1 -type f | wc -l)
          if [[ "$file_count" -lt "2" ]]; then
            echo "::error::expected at least 2 artifacts in $dir, got $file_count"
            ls -laR "$dir"
            exit 1
          fi
          echo "OK: $file_count artifact(s) produced"
        shell: bash

      - name: Verify NO git tag created
        run: |
          if git tag --list | grep -q "v${{ inputs.version }}"; then
            echo "::error::--dry-run should not create tag, but v${{ inputs.version }} exists"
            exit 1
          fi
          echo "OK: no tag created"
        shell: bash

      - name: Cleanup (revert version changes)
        if: always()
        run: |
          set -e
          git checkout -- package.json packages/cli/package.json packages/upm/com.unictl.editor/package.json integrations/codex/plugin.config.json integrations/claude-code/support-pack.json packages/cli/src/capabilities.json
          # Verify clean tree post-cleanup
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::cleanup left dirty tree"
            git status
            exit 1
          fi
          echo "OK: working tree clean post-cleanup"
        shell: bash
