name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Error registry drift check
        run: bun run check:error-registry
        shell: bash

      - name: unictl --help
        run: bun run unictl -- --help

      - name: unictl build --help
        run: |
          output=$(bun run unictl -- build --help)
          echo "$output"
          echo "$output" | grep -q "BUILD PROFILE" || (echo "expected BUILD PROFILE heading" && exit 1)
        shell: bash

      - name: unictl version
        run: |
          output=$(bun run unictl -- version)
          echo "$output"
          echo "$output" | grep -E "[0-9]+\.[0-9]+\.[0-9]+" || (echo "expected semver" && exit 1)
        shell: bash

      - name: unictl doctor smoke (expect exit 1 on empty/non-Unity dir)
        run: |
          set +e
          output=$(bun run unictl -- doctor --project "$GITHUB_WORKSPACE")
          exit_code=$?
          echo "exit=$exit_code"
          echo "$output"
          # Current doctor contract (pre-D3): exit 1 on blocking checks, JSON with ok:false
          if [ "$exit_code" != "1" ] && [ "$exit_code" != "0" ]; then
            echo "unexpected exit code $exit_code (expected 0 or 1)"
            exit 1
          fi
          # Stdout should contain "ok" key (either true or false is acceptable at this stage)
          echo "$output" | grep -qE '"ok"[[:space:]]*:' || (echo "expected ok field" && exit 1)
        shell: bash
